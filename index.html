<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #111827;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: #3b82f6;
        }

        .hero {
            padding: 60px;
            text-align: center;
            background: linear-gradient(to right, #1e3a8a, #3b82f6);
            color: white;
        }

        .hero h1 {
            font-size: 40px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        footer {
            text-align: center;
            background: #111827;
            color: white;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my modern website</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <p>Clean, simple, and modern design</p>
    <button onclick="showMessage()">Explore</button>
</section>

<div class="container">

    <div class="card">
        <h2>About</h2>
        <p>This is your website. Customize this section with your own content.</p>
    </div>

    <div class="card">
        <h2>Services</h2>
        <p>Add your services or features here.</p>
    </div>

</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

<script>
    function showMessage() {
        alert("Welcome! 🚀");
    }
</script>

</body>
</html>
